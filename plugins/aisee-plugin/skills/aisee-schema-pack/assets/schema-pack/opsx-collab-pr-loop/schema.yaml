name: opsx-collab-pr-loop
version: 1
description: |
  适用场景：PR Code Review、外部技术调研、需要多轮迭代的协作任务。
  与 spec-driven 的区别：以"外部输入（PR / Issue / 调研问题）"为驱动，
  支持多轮迭代（checkpoints 判断是否需要下一轮），artifacts 放在 loop/ 子目录。
  创建时间：2026-04-20
  维护人：@team-lead

artifacts:
  - id: intake
    generates: loop/intake.md
    description: "接收并理解外部输入（PR / Issue / 调研请求）的背景和期望"
    template: intake.md
    requires: []
    instruction: |
      填写 intake 时需要（等同于 proposal 规范）：
      - 明确写出输入来源（PR 链接 / Issue 编号 / 调研发起人）
      - 用自己的话复述问题，确认理解正确
      - 标注影响范围和受影响的团队
      - 写清楚期望的处理结论（Review 意见 / 调研产出 / 决策建议）
      - 列出已知约束（截止时间、技术限制等）

  - id: research-plan
    generates: loop/research-plan.md
    description: "调研计划：要验证什么、用什么方式、预期结论形式"
    template: research-plan.md
    requires: [intake]
    instruction: |
      填写调研计划时（等同于 specs 规范）：
      - 把调研目标分解为具体的验证问题（每个问题要可以被"是/否/数据"回答）
      - 使用 Given/When/Then 格式描述关键验证场景
      - 至少覆盖 2 个边界 / 异常场景
      - 写明调研方法（代码分析 / 性能测试 / 原型验证等）
      - 说明产出形式（结论文档 / PR 评论 / 技术选型建议等）

  - id: implementation
    generates: loop/implementation.md
    description: "调研发现、PR Review 评论、或具体实现内容"
    template: implementation.md
    requires: [research-plan]
    instruction: |
      填写实现内容时：
      - 按 research-plan 的验证问题逐一给出结论
      - 区分"事实发现"和"个人判断"
      - PR Review 场景：使用 CRITICAL / WARNING / SUGGESTION 三级标注
      - 每条结论必须附带依据（代码行号 / 测试数据 / 文档链接）
      - 不能遗漏 research-plan 中的任何验证问题

  - id: checkpoints
    generates: loop/checkpoints.md
    description: "验收节点：确认产出是否满足目标，判断是否需要下一轮"
    template: checkpoints.md
    requires: [implementation]
    instruction: |
      填写验收节点时：
      - 对照 intake.md 的期望结论，逐项判断是否达成
      - 明确写出"本轮是否完成"的判断（完成 / 需要下一轮 / 阻塞等待）
      - 如需下一轮，写清楚下一轮的新 intake（残留问题 / 新发现的问题）
      - 如已完成，写明后续行动项（谁来执行，什么时间）

apply:
  requires: [research-plan]
  tracks: loop/implementation.md
  instruction: |
    按 loop/implementation.md 的结构逐项完成内容。
    如果是 PR Review 场景，将结论直接输出为 PR 评论格式。
    如果是调研场景，按 research-plan 的验证问题顺序填写结论。
    完成后填写 loop/checkpoints.md。
