name: infra-change
version: 1
description: '适用场景：服务器配置、CI/CD 流水线、部署流程、云资源、网络配置的变更。

  与 spec-driven 的区别：在 proposal 之后强制增加 impact-assessment.md（影响评估）

  和 rollback-plan.md（回滚方案），两者都完成后才能生成 tasks，确保变更前充分评估风险。

  创建时间：2026-04-20

  维护人：@infra-team

  '
capabilities:
- apply_execution
- archive_authority
- infra_evidence
artifacts:
- id: proposal
  generates: proposal.md
  description: 变更提案：为什么做、改什么、变更窗口
  template: proposal.md
  requires: []
  requiredness: always
  capabilities:
  - primary_brief
  instruction: '基础设施变更的 proposal 必须额外包含：

    - 变更窗口（计划执行时间、预计持续时长）

    - 是否需要维护期（maintenance window）

    - 通知计划（谁需要提前知道这个变更）

    - 变更审批者（必须与提案人不同）

    '
- id: impact-assessment
  generates: impact-assessment.md
  description: 影响评估：哪些服务受影响、停机时间、降级策略
  template: impact-assessment.md
  requires:
  - proposal
  requiredness: always
  capabilities:
  - infra_impact
  instruction: '填写影响评估时：

    - 必须列出所有直接依赖当前基础设施的服务

    - 评估每个服务的影响程度（中断 / 降级 / 无影响）

    - 估算停机时间（乐观 / 悲观）

    - 写明变更期间的降级策略（如有）

    - 评估对 SLA 的影响

    '
- id: rollback-plan
  generates: rollback-plan.md
  description: 回滚方案：触发条件、回滚步骤、验证方法
  template: rollback-plan.md
  requires:
  - proposal
  requiredness: always
  capabilities:
  - infra_rollback
  instruction: '填写回滚方案时：

    - 必须写明触发回滚的判断标准（什么情况下决定回滚）

    - 回滚步骤必须按操作顺序写，不能模糊（"恢复配置"这样的描述不够）

    - 写明回滚操作的预计耗时

    - 写明回滚后如何验证系统恢复正常

    - 如果回滚本身有风险，必须写明

    '
- id: tasks
  generates: tasks.md
  description: 实现清单（包含预检、变更执行、验证和回滚准备）
  template: tasks.md
  requires:
  - impact-assessment
  - rollback-plan
  requiredness: always
  capabilities:
  - apply_track
  instruction: '基础设施变更的 tasks 必须包含：

    - 变更前预检阶段（确认环境状态、备份、通知）

    - 变更执行阶段（按步骤操作）

    - 变更后验证阶段（每项服务逐一确认）

    - 回滚准备：确认回滚命令/脚本已就绪（在执行前就验证回滚可行）

    '
apply:
  requires:
  - tasks
  tracks: tasks.md
  instruction: '执行基础设施变更时：

    - 严格按 tasks.md 顺序操作，禁止跳步

    - 每完成一步打勾，并记录实际完成时间

    - 如果任何步骤与预期不符：立即停止 → 评估是否触发回滚条件 → 决策

    - 变更窗口结束时仍未完成：启动回滚，下次重新安排

    '
archive:
  tracks:
  - tasks.md
  - rollback-plan.md
