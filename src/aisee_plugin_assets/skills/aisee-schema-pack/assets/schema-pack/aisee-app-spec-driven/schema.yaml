name: aisee-app-spec-driven
version: 2
description: |
  适用场景：App、小程序、Web、桌面软件、后端/API、CLI/工具、异步任务和常规全栈开发。
  本 schema 承接 change 前的 SRS、UI Content、Architecture 和 Change Plan，把它们压缩成
  单个 OpenSpec change 内可实现、可验证、可追踪的 artifacts。
  与官方 spec-driven 的区别：增加 source-map.md 作为 ID 路由表，增加 change-context.md 承接
  本 change 相关架构约束，并按需生成 ui-contract.md、service-contract.md、data-model.md。
  当前后端分仓或存在独立契约仓库时，source-map.md 与 service-contract.md 必须记录契约 owner、
  provider / consumer、同步模式和机器可读契约附件路径；OpenAPI、events、webhooks、proto 等文件
  是可选契约附件，不默认要求生成，但必须能被追踪。
  最小闭环是 proposal.md、source-map.md、specs/**/*.md 和 tasks.md。
  change-context.md、ui-contract.md、service-contract.md、data-model.md 是按需 artifacts；
  source-map.md 的 Artifact 适用性表明确 Required=no 且写明原因时，可以不展开对应 contract。
  这避免前端-only、后端-only、CLI-only、job-only 或极小 change 被无效流程拖慢。
  正式 ID 必须来自 aisee/registry/id-registry.json。AI 不得临时发明正式 ID；工具不可用时只能使用
  {{scope}}:<TYPE>-NEW-001 形式的临时占位符并标注 [ID-RESERVATION-REQUIRED]。
  创建时间：2026-05-24
  更新：2026-06-01
  维护人：@aisee

artifacts:
  - id: proposal
    generates: proposal.md
    description: "变更提案：为什么做、做什么、不做什么、成功标准"
    template: proposal.md
    requires: []
    instruction: |
      proposal.md 必须明确：
      - 背景、问题、目标和非目标
      - 上下文读取顺序：source-map.md、specs、Required=yes 的 artifacts、tasks.md
      - 本 change 覆盖的上游完整 ID 摘要，包括 FR / NFR / RULE / PAGE / FLOW / STATE / ARCH / DEC / CONSTRAINT / RISK；完整路由由 source-map.md 维护
      - 正式 ID 必须来自 aisee/registry/id-registry.json；未分配 ID 时只使用临时占位符并标注 [ID-RESERVATION-REQUIRED]
      - 成功标准必须是可验证结果，不写验证执行记录
      - 不要复制 SRS、UI Content 或 Architecture 全文
      - 不要写实现细节、接口字段、数据库字段或任务步骤；这些分别进入 contract artifacts 和 tasks.md

  - id: source-map
    generates: source-map.md
    description: "ID 路由表：绑定 SRS、UI Content、Architecture、Change Plan、change artifacts 和 tasks，并索引候选影响路径与预期证据类型"
    template: source-map.md
    requires: [proposal]
    instruction: |
      source-map.md 是本 schema 的追踪核心，必须：
      - 记录 `aisee change author-check <change> --json` 的状态、blockers、missing_artifacts 和 next_actions
      - 列出上游来源：SRS、UI Content、Design Spec / Design Assets、Architecture、Change Plan、Issue 或用户输入
      - 使用完整 ID（如 auth:FR-001）建立追踪关系；短 ID 只用于人类阅读
      - 生成或引用正式 ID 前必须通过 Aisee CLI / aisee/registry/id-registry.json 校验；不得由 AI 临时编正式编号
      - 记录需要执行的 ID 动作：reserve、activate、fix missing、replace inactive
      - 映射上游输入 ID：FR / NFR / RULE / PAGE / FLOW / STATE / ARCH / DEC / CONSTRAINT / RISK
      - 映射本 change 产出 ID：SPEC / API / DATA / TASK / TEST
      - 明确不在范围内的上游条目
      - 声明 change-context.md、ui-contract.md、service-contract.md、data-model.md 是否适用；Required=no 必须写具体原因
      - 当 service-contract.md Required=yes 或涉及跨仓库协作时，记录契约归属、权威来源、provider、consumer、同步模式、冲突规则、版本引用和机器可读契约附件路径
      - Required=no 的 contract 不需要展开完整模板；如项目要求保留文件，只写状态和 N/A 原因即可
      - 候选影响路径只作为索引，不写具体实现步骤
      - 预期证据只作为索引，不写最终验证结论
      - 记录 ID 是否来自 aisee/registry/id-registry.json；不得让 AI 临时发明编号
      - 工具不可用时使用 {{scope}}:<TYPE>-NEW-001 临时占位符，并标注 [ID-RESERVATION-REQUIRED]
      - 保留 [ASSUMPTION]、[SPEC-GAP]、[STACK-CONTEXT-MISSING]、[STACK-DECISION-REQUIRED]、[ARCHITECTURE-DECISION-REQUIRED]、[STACK-CONFLICT] 等阻塞标签

  - id: specs
    generates: specs/**/*.md
    description: "用户可观察行为与验收场景"
    template: spec.md
    requires: [source-map]
    instruction: |
      specs 必须只描述用户可观察行为和验收条件：
      - 使用 SHALL/MUST 或 Given/When/Then 场景表达行为
      - SPEC ID 必须来自 aisee/registry/id-registry.json；未分配时使用临时占位符并标注 [ID-RESERVATION-REQUIRED]
      - 覆盖 source-map.md 中本 change 的 FR / NFR / RULE / FLOW / STATE
      - Context References 只能写 Source IDs 和相关 artifact 引用；完整追踪由 source-map.md 维护
      - 可以引用 PAGE / API / DATA / CONSTRAINT ID 作为上下文，但不要写布局、接口字段、数据库字段、设计规范、代码路径或任务步骤
      - 发现需求缺口时标注 [SPEC-GAP]，不要自行新增业务需求

  - id: change-context
    generates: change-context.md
    description: "Change 架构交接：本 change 从 Architecture 承接的约束、局部决策、风险和转交事项"
    template: change-context.md
    requires: [source-map, specs]
    instruction: |
      change-context.md 仅在涉及 Architecture 决策、技术约束、平台限制、集成边界或风险时适用。
      如果 source-map.md 标为 Required=no，可不展开完整模板；需要保留文件时只写状态和 N/A 原因。
      适用时必须只描述本 change 必须承接的架构交接：
      - 读取 proposal.md、source-map.md 和 specs
      - 承接 Architecture 中与本 change 相关的 ARCH / DEC / CONSTRAINT / RISK
      - 新增局部 DEC / CONSTRAINT / RISK ID 前必须通过 ID registry 预留
      - 记录本 change 的局部决策、允许偏差、风险和阻塞项
      - 说明哪些约束或风险需要转交给 ui-contract.md、service-contract.md、data-model.md 或 tasks.md
      - 不要重写全局 Architecture、完整技术栈或模块架构，不要展开页面字段、接口请求响应、表字段或实现步骤

  - id: ui-contract
    generates: ui-contract.md
    description: "UI 合同：页面内容结构、交互状态、权限可见性和前端数据需求"
    template: ui-contract.md
    requires: [source-map, specs]
    instruction: |
      ui-contract.md 仅在涉及页面、弹窗、交互、表单、权限可见性或前端数据需求时适用。
      如果 source-map.md 标为 Required=no，可不展开完整模板；需要保留文件时只写状态和 N/A 原因。
      适用时必须覆盖：
      - 页面 / 弹窗 / 全局入口清单
      - 新增 PAGE / FLOW / STATE ID 前必须通过 ID registry 预留
      - Existing / Changed / New / Deprecated / Unknown 的 UI 变更范围；Existing 只引用来源，不重写完整规格
      - 页面内容结构、区块、操作、状态反馈和权限可见性
      - 前端需要的数据与来源能力
      - 当前端数据依赖服务契约时，只记录数据需求、能力引用和后端能力状态，不把 ui-contract.md 当作 API 事实源
      - 引用 Design Spec / Design Assets / dev-visual-brief 中对本 change 生效的组件库、token、资产、布局、响应式、可访问性、动效和视觉验收约束
      - 轻量覆盖检查；跨文档追踪关系写入 source-map.md，验证证据写入 source-map.md 或 tasks.md
      - 不要在 ui-contract.md 重新定义或复制完整视觉规范、组件库、配色、排版或像素布局；这些仍以 Design Spec / Design Assets 为事实源

  - id: data-model
    generates: data-model.md
    description: "数据模型合同：实体、表、字段、关系、约束、索引、迁移"
    template: data-model.md
    requires: [source-map, specs]
    instruction: |
      data-model.md 仅在新增或修改持久化数据、字段、表、关系、索引、迁移时适用。
      如果 source-map.md 标为 Required=no，可不展开完整模板；需要保留文件时只写状态和 N/A 原因。
      适用时必须覆盖：
      - 核心实体与表
      - 新增 DATA ID 前必须通过 ID registry 预留
      - Existing / Changed / New / Deprecated / Unknown 的数据变更范围；Existing 只引用来源，不重写完整数据模型
      - 字段、类型、必填、默认值、约束和说明
      - 关系、唯一约束、索引、数据迁移、回滚和兼容策略
      - 数据所有权、删除/归档、审计字段和敏感数据处理
      - 轻量覆盖检查；跨文档追踪关系写入 source-map.md，验证证据写入 source-map.md 或 tasks.md

  - id: service-contract
    generates: service-contract.md
    description: "服务合同：API、后端能力、异步任务、CLI/工具命令、外部集成、权限、错误和可观测性"
    template: service-contract.md
    requires: [source-map, specs]
    instruction: |
      service-contract.md 仅在涉及接口、后端能力、服务边界、异步任务、CLI/工具命令或外部集成时适用。
      如果 source-map.md 标为 Required=no，可不展开完整模板；需要保留文件时只写状态和 N/A 原因。
      适用时必须覆盖：
      - API / backend service / async job / scheduled job / CLI or tool command / integration endpoint
      - 新增 API ID 前必须通过 ID registry 预留
      - Existing / Changed / New / Deprecated / Unknown 的服务变更范围；Existing 只引用来源，不重写完整契约
      - 契约归属、权威来源、provider / consumer、同步模式、冲突规则、版本引用和机器可读契约附件路径
      - OpenAPI / events / webhooks / proto 等机器可读契约只作为可选附件追踪；默认不要求每个 change 生成
      - 请求响应、命令参数、权限、错误、幂等、分页、排序、过滤、重试、超时必须明确
      - 业务逻辑、状态流转、校验规则、异步任务和通知必须引用 specs / RULE，不复制需求全文
      - 数据读写、事务、一致性和失败处理必须引用 data-model.md
      - 可观测性、审计、日志、指标和告警要求必须明确
      - 轻量覆盖检查；跨文档追踪关系写入 source-map.md，验证证据写入 source-map.md 或 tasks.md
      - 引用 ui-contract.md 的前端数据需求和 data-model.md 的数据对象时必须保持追踪闭合
      - 不要脱离 source-map.md 或 data-model.md 自造字段或状态

  - id: tasks
    generates: tasks.md
    description: "实现与验证清单：按 specs、source-map 和 Required=yes 的 artifacts 生成可执行任务与证据要求"
    template: tasks.md
    requires: [source-map, specs]
    instruction: |
      tasks.md 是唯一长期任务清单，只记录执行顺序、任务状态和验证证据；不得承载需求、契约、ID 注册、来源追踪或归档判断。
      tasks.md 必须保持轻量：
      - 执行前只确认 source-map.md 与 proposal.md 范围一致
      - 确认 specs 覆盖本 change 的 FR / NFR / RULE
      - 确认 Required=yes 的 change-context / ui-contract / service-contract / data-model 已完成
      - 确认 Required=no 的按需 artifact 已在 source-map.md 写明 N/A 原因
      - 确认无阻塞项；保留风险已写入 source-map.md
      - 实现任务必须引用已有 specs / contract / source-map ID，不重新描述需求、页面、接口或数据模型
      - 当前后端分仓协作适用时，任务必须覆盖 provider implementation、consumer integration、mock / SDK / generated client 使用或 N/A、contract test、backward compatibility check
      - 验证任务必须关联 TEST ID，并记录证据命令或证据路径
      - 完成确认只记录任务和验证是否完成；归档判断交给 aisee:archive-guard

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    实现时必须按 tasks.md 执行并逐项打勾。
    发现 specs、change-context 或 contract 与代码事实冲突时：
    - 暂停实现
    - 更新对应 artifact
    - 保持 source-map.md 的追踪关系闭合
